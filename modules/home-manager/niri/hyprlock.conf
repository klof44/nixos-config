background {
    monitor =
    path = /home/maxim/.config/hypr/bg.png
    blur_passes = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# GENERAL
general {
    hide_cursor = true
    grace = 5
    disable_loading_bar = true
    ignore_empty_input = true
}

# DATE
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = #caa3ee
  font_size = 22
  font_family = JetBrains Mono NF
  position = 0, 80
  halign = center
  valign = center
}

# TIME
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%-I:%M")"
  color = #caa3ee
  font_size = 95
  font_family = JetBrains Mono NF Extrabold
  position = 0, 200
  halign = center
  valign = center
}

image {
  monitor = 
  path = 
  reload_time = 1
  reload_cmd = ~/.config/hypr/scripts/media-cache.sh
  size = 90
  rounding = 3
  border_size = 0
  position = 25, 25
  halign = left
  valign = bottom
}
label {
  monitor = 
  text = cmd[update:1000] ~/.config/hypr/scripts/media-info.sh && ~/.config/hypr/scripts/media-cache.sh -s
  color = #caa3ee
  font_size = 18
  font_family = JetBrains Mono NF
  position = 130, 52
  halign = left
  valign = bottom
}